<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Accès sécurisé — Fyra Property Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --fyra-navy: #232852;
  --fyra-green: #72AA82;
  --fyra-coral: #FF5757;
  --fyra-green-light: #F1F7F3;
  --fyra-green-mid: #D5E6DA;
  --fyra-navy-light: #E9EAEE;
  --fyra-gray: #656986;
  --font: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--fyra-green-light);
  color: var(--fyra-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-card {
  background: white;
  border: 1px solid var(--fyra-navy-light);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(35, 40, 82, 0.08);
  padding: 48px 40px;
  max-width: 460px;
  width: 100%;
}
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
}
.brand-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 28px;
  font-weight: 700;
  color: var(--fyra-navy);
  letter-spacing: -0.5px;
}
.brand-logo .dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: var(--fyra-green);
  border-radius: 2px;
  margin-bottom: 6px;
}
.brand-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--fyra-green);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 4px;
}
.divider {
  width: 60px;
  height: 4px;
  background: var(--fyra-green);
  margin: 28px auto;
  border-radius: 2px;
}
.title {
  font-size: 20px;
  font-weight: 600;
  color: var(--fyra-navy);
  text-align: center;
  margin-bottom: 10px;
}
.subtitle {
  font-size: 14px;
  color: var(--fyra-gray);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.5;
}
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--fyra-navy);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.password-wrapper {
  position: relative;
}
input[type="password"], input[type="text"] {
  width: 100%;
  padding: 14px 44px 14px 16px;
  border: 1.5px solid var(--fyra-navy-light);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 15px;
  color: var(--fyra-navy);
  background: white;
  transition: border-color 0.2s;
}
input:focus {
  outline: none;
  border-color: var(--fyra-green);
}
.toggle-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--fyra-gray);
  padding: 4px;
  font-size: 18px;
  line-height: 1;
}
.toggle-eye:hover { color: var(--fyra-navy); }
button.submit {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: var(--fyra-navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: background 0.2s;
}
button.submit:hover { background: #393D63; }
button.submit:disabled {
  background: var(--fyra-gray);
  cursor: not-allowed;
}
.error {
  margin-top: 16px;
  padding: 12px 14px;
  background: #FFEEEE;
  border-left: 3px solid var(--fyra-coral);
  border-radius: 4px;
  font-size: 13px;
  color: #993434;
  display: none;
}
.error.show { display: block; }
.footer {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--fyra-navy-light);
  text-align: center;
  font-size: 10px;
  color: var(--fyra-gray);
  line-height: 1.6;
}
.lock-icon {
  width: 40px;
  height: 40px;
  background: var(--fyra-green-light);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  color: var(--fyra-green);
  font-size: 18px;
}
.loading {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-card" id="login">
  <div class="brand">
    <div class="brand-logo">fyra<span class="dot"></span></div>
    <div class="brand-sub">property management</div>
  </div>
  <div class="lock-icon">🔒</div>
  <div class="title">Accès sécurisé</div>
  <div class="subtitle">
    Cette page est réservée à un destinataire identifié.<br>
    Veuillez saisir le mot de passe qui vous a été communiqué.
  </div>
  <label class="field-label" for="pwd">Mot de passe</label>
  <div class="password-wrapper">
    <input type="password" id="pwd" autocomplete="off" autofocus placeholder="••••••••••••">
    <button type="button" class="toggle-eye" id="toggleEye" aria-label="Afficher le mot de passe">👁</button>
  </div>
  <button class="submit" id="submitBtn">Accéder au document</button>
  <div class="error" id="error"></div>
  <div class="footer">
    Document confidentiel — Fyra Property Management
  </div>
</div>

// ============ UTILS ============
function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, saltBytes, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations: iterations, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryDecrypt(password) {
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv = b64ToBytes(PAYLOAD.iv);
  const ct = b64ToBytes(PAYLOAD.ct);
  const key = await deriveKey(password, salt, PAYLOAD.iterations);
  const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
  return new TextDecoder().decode(plainBuf);
}

// ============ UI ============
const pwdInput = document.getElementById("pwd");
const submitBtn = document.getElementById("submitBtn");
const errorBox = document.getElementById("error");
const toggleEye = document.getElementById("toggleEye");

toggleEye.addEventListener("click", () => {
  if (pwdInput.type === "password") {
    pwdInput.type = "text";
    toggleEye.textContent = "🙈";
  } else {
    pwdInput.type = "password";
    toggleEye.textContent = "👁";
  }
});

let attempts = 0;
const MAX_ATTEMPTS = 5;

async function unlock() {
  const pwd = pwdInput.value;
  if (!pwd) {
    showError("Veuillez saisir le mot de passe.");
    return;
  }
  if (attempts >= MAX_ATTEMPTS) {
    showError("Nombre maximum de tentatives atteint. Veuillez recharger la page.");
    return;
  }
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading"></span>Vérification...';
  errorBox.classList.remove("show");

  try {
    const plaintext = await tryDecrypt(pwd);
    // Succès : on crée un Blob HTML et on redirige vers une blob: URL.
    // Avantage par rapport à document.write : préserve TOUS les événements
    // natifs (drag sur input[type=range], etc.) car le navigateur charge la
    // page comme un vrai document. Le Blob reste 100% local au navigateur,
    // aucune donnée n'est envoyée sur Internet.
    const blob = new Blob([plaintext], { type: "text/html" });
    const blobUrl = URL.createObjectURL(blob);
    window.location.replace(blobUrl);
  } catch (e) {
    attempts++;
    const remaining = MAX_ATTEMPTS - attempts;
    if (remaining > 0) {
      showError(`Mot de passe incorrect. ${remaining} tentative${remaining > 1 ? 's' : ''} restante${remaining > 1 ? 's' : ''}.`);
    } else {
      showError("Trop de tentatives échouées. Veuillez recharger la page.");
      submitBtn.disabled = true;
      return;
    }
    submitBtn.disabled = false;
    submitBtn.textContent = "Accéder au document";
    pwdInput.value = "";
    pwdInput.focus();
  }
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add("show");
}

submitBtn.addEventListener("click", unlock);
pwdInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") unlock();
});
</script>
